<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>websh — Lightweight web terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0d1117;--sf:#161b22;--bd:#30363d;--tx:#e6edf3;--dim:#8b949e;
      --ac:#58a6ff;--ach:#79c0ff;--dg:#f85149;--ok:#3fb950;--wn:#d29922;
      --radius:8px;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden}

    /* ── Top bar ── */
    .top{display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;min-height:40px}
    .top-l{display:flex;align-items:center;gap:10px}
    .logo{font-size:14px;font-weight:700;letter-spacing:-.5px}
    .top-slogan{font-size:11px;color:var(--dim)}
    .s-off{background:rgba(248,81,73,.15);color:var(--dg)}
    .s-wait{background:rgba(210,153,34,.15);color:var(--wn)}
    .s-on{background:rgba(63,185,80,.15);color:var(--ok)}
    .btn{padding:5px 14px;border-radius:var(--radius);border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-size:12px;cursor:pointer;transition:.15s;white-space:nowrap}
    .btn:hover{border-color:var(--dim)}
    .btn-p{background:var(--ac);border-color:var(--ac);color:#fff}
    .btn-p:hover{background:var(--ach)}
    .btn-d{border-color:var(--dg);color:var(--dg)}
    .btn-d:hover{background:rgba(248,81,73,.15)}
    .btn-cancel{margin-left:8px}

    /* ── Overlay ── */
    .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
    .ov.h{display:none}
    .panel{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:24px 28px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto}
    .panel h2{font-size:17px;margin-bottom:4px;font-weight:600}
    .slogan{font-size:12px;color:var(--dim);margin-bottom:16px}

    /* ── Saved / server connections ── */
    .saved-section{margin-bottom:20px}
    .saved-label{font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .saved-list{max-height:176px;overflow-y:auto;border:1px solid var(--bd);border-radius:var(--radius)}
    .saved-list:empty{display:none}
    .saved-section:has(.saved-list:empty){display:none}
    .sv{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--bd);transition:background .1s;cursor:pointer}
    .sv:last-child{border-bottom:none}
    .sv:hover{background:rgba(88,166,255,.06)}
    .sv-info{flex:1;min-width:0}
    .sv-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sv-host{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sv-actions{display:flex;gap:4px;flex-shrink:0;margin-left:8px}
    .sv-btn{padding:4px 10px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--dim);font-size:11px;cursor:pointer;transition:.15s}
    .sv-btn.del:hover{color:var(--dg);background:rgba(248,81,73,.1)}
    .saved-list::-webkit-scrollbar{width:6px}
    .saved-list::-webkit-scrollbar-track{background:transparent}
    .saved-list::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

    .divider{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd)}
    .divider span{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}

    /* ── Form ── */
    .fg{margin-bottom:12px}
    .fg label{display:block;font-size:11px;font-weight:600;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
    .fg input{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
    .fg input:focus{border-color:var(--ac)}
    .row{display:flex;gap:10px}.row .fg{flex:1}
    .save-row{display:flex;align-items:center;gap:8px;margin:12px 0 4px}
    .save-row input[type=checkbox]{accent-color:var(--ac);width:14px;height:14px;cursor:pointer}
    .save-row label{font-size:13px;color:var(--dim);cursor:pointer}
    .save-name{margin-top:6px}
    .save-name.h{display:none}
    .auth-tabs{display:flex;gap:0;margin-bottom:12px;border:1px solid var(--bd);border-radius:var(--radius);overflow:hidden}
    .auth-tab{flex:1;padding:6px;border:none;background:var(--bg);color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
    .auth-tab.active{background:var(--bd);color:var(--tx)}
    .auth-tab:hover:not(.active){background:rgba(88,166,255,.06)}
    .fg textarea{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:12px;font-family:'Menlo','Monaco',monospace;outline:none;transition:border-color .15s;resize:vertical;min-height:60px}
    .fg textarea:focus{border-color:var(--ac)}
    .fg-hint{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;display:block}
    .h{display:none!important}
    .panel .btn-p{width:100%;padding:10px;font-size:14px;margin-top:8px}
    .panel .btn-row{display:flex;gap:8px;margin-top:8px}
    .panel .btn-row .btn-p{flex:1}
    .err{color:var(--dg);font-size:13px;margin-top:10px;display:none}
    .err.on{display:block}

    /* ── Panes ── */
    #panes{flex:1;display:flex;overflow:hidden}
    .pane{display:flex;flex-direction:column;flex:1;min-width:0;min-height:0;position:relative}
    .pane.active>.pane-bar{background:var(--sf)}
    .pane-bar{display:flex;align-items:center;gap:6px;padding:2px 8px;background:var(--bg);border-bottom:1px solid var(--bd);flex-shrink:0}
    .pane-badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500}
    .pane-label{font-size:11px;color:var(--dim);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pane-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:3px;transition:.15s}
    .pane-btn:hover{color:var(--tx);background:rgba(255,255,255,.08)}
    .pane-btn:disabled{opacity:.3;cursor:default;pointer-events:none}
    .pane-btn.close:hover{color:var(--dg)}
    .upload-progress{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
    .upload-progress-track{flex:1;height:14px;background:var(--bg);border-radius:7px;border:1px solid var(--bd);overflow:hidden;position:relative}
    .upload-progress-bar{height:100%;background:var(--ac);border-radius:7px;transition:width .15s;width:0%}
    .upload-progress-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 6px}
    .upload-progress-cancel{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:2px 4px;border-radius:3px;transition:.15s;flex-shrink:0}
    .upload-progress-cancel:hover{color:var(--dg);background:rgba(248,81,73,.1)}
    .pane-term{flex:1;overflow:hidden;padding:2px}
    .xterm-viewport::-webkit-scrollbar{width:8px}
    .xterm-viewport::-webkit-scrollbar-track{background:transparent}
    .xterm-viewport::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}

    .split-h{display:flex;flex-direction:row;flex:1;min-width:0;min-height:0}
    .split-v{display:flex;flex-direction:column;flex:1;min-width:0;min-height:0}
    .split-handle{flex-shrink:0;background:var(--bd);transition:background .15s}
    .split-h>.split-handle{width:3px;cursor:col-resize}
    .split-v>.split-handle{height:3px;cursor:row-resize}
    .split-handle:hover,.split-handle.dragging{background:var(--ac)}
    body.resizing{cursor:col-resize!important;user-select:none!important}
    body.resizing-v{cursor:row-resize!important;user-select:none!important}

    /* ── Reconnect bar ── */
    .reconnect-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 8px;background:rgba(248,81,73,.08);border-bottom:1px solid var(--bd);flex-shrink:0}
    .reconnect-bar .btn{font-size:11px;padding:3px 12px}

    /* ── Idle warning ── */
    .idle-warn{position:absolute;bottom:8px;right:12px;z-index:50;background:var(--sf);border:1px solid var(--wn);border-radius:var(--radius);padding:6px 12px;font-size:12px;color:var(--wn);display:flex;align-items:center;gap:8px}
    .idle-warn .btn{font-size:11px;padding:3px 10px;border-color:var(--wn);color:var(--wn)}
    .idle-warn .btn:hover{background:rgba(210,153,34,.15)}

    /* ── Search bar ── */
    .search-bar{position:absolute;top:28px;right:12px;display:flex;gap:4px;z-index:50;background:var(--sf);border:1px solid var(--bd);border-radius:var(--radius);padding:4px 6px;align-items:center}
    .search-bar.h{display:none}
    .search-bar input{background:var(--bg);border:1px solid var(--bd);border-radius:4px;color:var(--tx);padding:3px 8px;font-size:12px;width:200px;outline:none}
    .search-bar input:focus{border-color:var(--ac)}
    .search-bar button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:2px 4px}
    .search-bar button:hover{color:var(--tx)}

    /* ── Top bar buttons ── */
    .top-r{display:flex;align-items:center;gap:6px}
    .tbtn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:15px;padding:4px;border-radius:4px;transition:.15s;line-height:1}
    .tbtn:hover{color:var(--tx);background:rgba(255,255,255,.06)}

    /* ── Bell flash ── */
    .pane.bell{animation:bellflash .15s}
    @keyframes bellflash{0%,100%{box-shadow:none}50%{box-shadow:inset 0 0 0 2px var(--wn)}}

    /* ── Light theme ── */
    [data-theme="light"]{--bg:#fff;--sf:#f6f8fa;--bd:#d0d7de;--tx:#1f2328;--dim:#656d76;--ac:#0969da;--ach:#0550ae;--dg:#cf222e;--ok:#1a7f37;--wn:#9a6700}
    [data-theme="light"] .xterm{--xterm-bg:#fff}
  </style>
</head>
<body>

<!-- Top bar -->
<div class="top">
  <div class="top-l">
    <span class="logo">websh</span>
    <span class="top-slogan">Lightweight web terminal</span>
  </div>
  <div class="top-r">
    <button class="tbtn" onclick="toggleSearch()" title="Search (Ctrl+Shift+F)" aria-label="Search">&#x1F50D;</button>
    <button class="tbtn" onclick="zoomIn()" title="Zoom in (Ctrl+Plus)" aria-label="Zoom in">A+</button>
    <button class="tbtn" onclick="zoomOut()" title="Zoom out (Ctrl+Minus)" aria-label="Zoom out">A-</button>
    <button class="tbtn" onclick="exportTerminal()" title="Export terminal" aria-label="Export terminal">&#x1F4CB;</button>
    <button class="tbtn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme" id="btnTheme">&#x25D1;</button>
    <button class="tbtn" onclick="toggleFullscreen()" title="Fullscreen (F11)" aria-label="Fullscreen">&#x26F6;</button>
  </div>
</div>

<!-- Pane container -->
<div id="panes"></div>

<!-- Connect overlay -->
<div id="ov" class="ov h">
  <div class="panel">
    <h2>websh</h2>
    <div class="slogan">Lightweight web terminal</div>

    <div id="serverSection" class="saved-section h">
      <div class="saved-label">Server connections</div>
      <div id="serverList" class="saved-list"></div>
    </div>

    <div id="localSection" class="saved-section">
      <div class="saved-label">Saved connections</div>
      <div id="savedList" class="saved-list"></div>
    </div>

    <div id="divider" class="divider"><span>Connect</span></div>

    <div id="manualForm">
    <div class="row">
      <div class="fg"><label>Host</label><input id="iH" placeholder="example.com"></div>
      <div class="fg" style="max-width:90px"><label>Port</label><input id="iP" type="number" value="22"></div>
    </div>
    <div class="fg"><label>Username</label><input id="iU" placeholder="root"></div>

    <div class="auth-tabs">
      <button id="tabPw" class="auth-tab active" onclick="setAuthTab('pw')">Password</button>
      <button id="tabKey" class="auth-tab" onclick="setAuthTab('key')">SSH Key</button>
    </div>
    <div id="authPw" class="fg">
      <label>Password</label>
      <input id="iPw" type="password">
    </div>
    <div id="authKey" class="fg h">
      <label>Private Key</label>
      <textarea id="iKey" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----&#10;...&#10;-----END OPENSSH PRIVATE KEY-----" rows="4"></textarea>
      <div style="margin-top:4px">
        <label class="fg-hint">Passphrase (if any)</label>
        <input id="iKeyPw" type="password" placeholder="optional">
      </div>
    </div>

    <div class="save-row">
      <input type="checkbox" id="iSave" onchange="toggleSaveName()">
      <label for="iSave">Save this connection</label>
    </div>
    <div id="saveNameWrap" class="save-name h">
      <div class="fg"><label>Connection name</label><input id="iName" placeholder="my-server"></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-p" onclick="doConnect()">Connect</button>
    </div>
    </div><!-- /manualForm -->
    <button id="btnCancel" class="btn btn-cancel h" onclick="cancelConnect()">Cancel</button>
    <div id="err" class="err"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.8.0/lib/addon-unicode11.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-search@0.15.0/lib/addon-search.min.js"></script>
<script>
// ── Helpers ─────────────────────────────────────────────────────────
function $(id){ return document.getElementById(id) }
function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML }

var API = location.pathname.replace(/\/[^/]*$/, '') + '/api.php';
function api(action, opts) {
  opts = opts || {};
  var url = API + '?action=' + action + (opts.query || '');
  var init = {};
  if (opts.body) { init.method='POST'; init.body=JSON.stringify(opts.body); init.headers={'Content-Type':'application/json'} }
  return fetch(url, init).then(function(r){ return r.json() });
}

// ── Pane management ─────────────────────────────────────────────────
var panes = {};
var activeId = null;
var paneCounter = 0;
var connectingFor = null; // pane ID the overlay is connecting for
var serverConfig = null;
var sessionTimeout = 300; // updated from server config
var fontSize = 14;
var MAX_POLL_RETRIES = 5;
var authMode = 'pw';

var darkTheme = {
  background:'#0d1117',foreground:'#e6edf3',cursor:'#58a6ff',cursorAccent:'#0d1117',
  selectionBackground:'rgba(88,166,255,0.3)',
  black:'#484f58',red:'#ff7b72',green:'#3fb950',yellow:'#d29922',
  blue:'#58a6ff',magenta:'#bc8cff',cyan:'#39d353',white:'#b1bac4',
  brightBlack:'#6e7681',brightRed:'#ffa198',brightGreen:'#56d364',
  brightYellow:'#e3b341',brightBlue:'#79c0ff',brightMagenta:'#d2a8ff',
  brightCyan:'#56d364',brightWhite:'#f0f6fc'
};
var lightTheme = {
  background:'#ffffff',foreground:'#1f2328',cursor:'#0969da',cursorAccent:'#ffffff',
  selectionBackground:'rgba(9,105,218,0.2)',
  black:'#24292f',red:'#cf222e',green:'#1a7f37',yellow:'#9a6700',
  blue:'#0969da',magenta:'#8250df',cyan:'#1b7c83',white:'#6e7781',
  brightBlack:'#57606a',brightRed:'#a40e26',brightGreen:'#2da44e',
  brightYellow:'#bf8700',brightBlue:'#218bff',brightMagenta:'#a475f9',
  brightCyan:'#3192aa',brightWhite:'#8c959f'
};
function currentTheme() {
  return document.documentElement.getAttribute('data-theme') === 'light' ? lightTheme : darkTheme;
}

function createPane(container) {
  var id = 'p' + (++paneCounter);
  var el = document.createElement('div');
  el.className = 'pane';
  el.setAttribute('data-pane', id);
  el.innerHTML =
    '<div class="pane-bar">' +
      '<span class="pane-badge s-off" data-pane-badge="' + id + '"></span>' +
      '<span class="pane-label" data-pane-label="' + id + '"></span>' +
      '<div class="upload-progress h" data-upload-progress="' + id + '">' +
        '<div class="upload-progress-track"><div class="upload-progress-bar"></div>' +
        '<div class="upload-progress-text"></div></div>' +
        '<button class="upload-progress-cancel" onclick="cancelTransfer(\'' + id + '\')" title="Cancel" aria-label="Cancel transfer">&#x2715;</button>' +
      '</div>' +
      '<button class="pane-btn" onclick="triggerUpload(\'' + id + '\')" title="Upload file" aria-label="Upload file" data-upload-btn="' + id + '" disabled>&#x2B06;</button>' +
      '<input type="file" class="h" data-upload-input="' + id + '" multiple onchange="handleUpload(\'' + id + '\',this)">' +
      '<button class="pane-btn" onclick="triggerDownload(\'' + id + '\')" title="Download file" aria-label="Download file" data-download-btn="' + id + '" disabled>&#x2B07;</button>' +
      '<button class="pane-btn" onclick="splitPane(\'' + id + '\',\'h\')" title="Split horizontal" aria-label="Split horizontal">&#x2194;</button>' +
      '<button class="pane-btn" onclick="splitPane(\'' + id + '\',\'v\')" title="Split vertical" aria-label="Split vertical">&#x2195;</button>' +
      '<button class="pane-btn close" onclick="closePane(\'' + id + '\')" title="Close pane" aria-label="Close pane">&#x2715;</button>' +
    '</div>' +
    '<div class="reconnect-bar h" data-reconnect="' + id + '">' +
      '<span style="font-size:12px;color:var(--dim)">Disconnected</span>' +
      '<button class="btn btn-p" onclick="reconnectPane(\'' + id + '\')">Reconnect</button>' +
      '<button class="btn" onclick="newConnectionPane(\'' + id + '\')">New connection</button>' +
    '</div>' +
    '<div class="pane-term"></div>' +
    '<div class="search-bar h" data-search="' + id + '">' +
      '<input type="text" placeholder="Search...">' +
      '<button onclick="searchPrev()">&#x25B2;</button>' +
      '<button onclick="searchNext()">&#x25BC;</button>' +
      '<button onclick="closeSearch()">&#x2715;</button>' +
    '</div>';
  container.appendChild(el);

  var termEl = el.querySelector('.pane-term');
  var fit = new FitAddon.FitAddon();
  var search = new SearchAddon.SearchAddon();
  var term = new Terminal({
    cursorBlink:true, cursorStyle:'bar', fontSize:fontSize,
    fontFamily:"'Menlo','Monaco','SF Mono','Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace",
    theme: currentTheme(),
    allowProposedApi:true, scrollback:50000
  });
  term.loadAddon(fit);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());
  var u = new Unicode11Addon.Unicode11Addon(); term.loadAddon(u);
  term.unicode.activeVersion = '11';
  term.loadAddon(search);
  term.open(termEl);

  var p = {
    id:id, el:el, term:term, fitAddon:fit, searchAddon:search,
    sid:null, polling:false, pollRetries:0,
    inputQueue:[], flushTimer:null, keepaliveTimer:null,
    label:'', resizeTimer:null, upload:null, download:null, connectBody:null,
    idleTimer:null, idleWarnEl:null
  };
  panes[id] = p;

  // Focus tracking
  el.addEventListener('mousedown', function(){ activatePane(id) });

  // Terminal events
  term.onData(function(d){ if(p.sid) queueInput(p,d) });
  term.onBinary(function(d){ if(p.sid) queueInput(p,d) });
  term.onResize(function(size) {
    if(!p.sid) return;
    if(p.resizeTimer) clearTimeout(p.resizeTimer);
    p.resizeTimer = setTimeout(function(){
      p.resizeTimer=null;
      if(p.sid) api('resize',{body:{session_id:p.sid,cols:size.cols,rows:size.rows}}).catch(function(){});
    }, 150);
  });
  term.onSelectionChange(function(){
    var sel=term.getSelection();
    if(sel && navigator.clipboard) navigator.clipboard.writeText(sel).catch(function(){});
  });
  term.onBell(function(){
    el.classList.remove('bell'); void el.offsetWidth; el.classList.add('bell');
  });

  // Right-click paste
  termEl.addEventListener('contextmenu', function(e){
    e.preventDefault();
    if(navigator.clipboard && navigator.clipboard.readText){
      navigator.clipboard.readText().then(function(t){ if(t && p.sid) queueInput(p,t) }).catch(function(){});
    }
  });

  // Resize observer
  new ResizeObserver(function(){ fit.fit() }).observe(termEl);
  setTimeout(function(){ fit.fit() }, 50);

  return p;
}

function activatePane(id) {
  if (activeId === id) return;
  var prev = activeId ? panes[activeId] : null;
  if (prev) prev.el.classList.remove('active');
  activeId = id;
  var p = panes[id];
  if (!p) return;
  p.el.classList.add('active');
  updatePaneBadge(p);
  p.term.focus();
}

function updatePaneBadge(p) {
  var badge = p.el.querySelector('[data-pane-badge]');
  if (!badge) return;
  var s = p.sid ? 'connected' : 'disconnected';
  if (p.sid && !p.polling) s = 'connecting';
  badge.className = 'pane-badge ' + (s==='connected'?'s-on':s==='connecting'?'s-wait':'s-off');
  badge.textContent = s.charAt(0).toUpperCase() + s.slice(1);
  if (activeId === p.id) setTitle(p.label || '');
  var busy = !!p.upload || !!p.download;
  var ub = p.el.querySelector('[data-upload-btn]');
  if (ub) ub.disabled = !p.sid || busy;
  var db = p.el.querySelector('[data-download-btn]');
  if (db) db.disabled = !p.sid || busy;
}

// ── Split / Close ───────────────────────────────────────────────────
function splitPane(id, dir) {
  var p = panes[id];
  if (!p) return;
  var parent = p.el.parentNode;
  var wrap = document.createElement('div');
  wrap.className = 'split-' + dir;
  var handle = document.createElement('div');
  handle.className = 'split-handle';
  parent.replaceChild(wrap, p.el);
  wrap.appendChild(p.el);
  wrap.appendChild(handle);

  // Create new pane placeholder
  var np = createPane(wrap);
  activatePane(np.id);

  // Show overlay for new pane
  connectingFor = np.id;
  showOverlay();
  $('btnCancel').classList.remove('h');
}

function cancelConnect() {
  if (!connectingFor) return;
  var np = panes[connectingFor];
  if (np && !np.sid) {
    // Undo split: remove the wrapper, put the sibling back
    var wrap = np.el.parentNode;
    var parent = wrap.parentNode;
    var sibling = null;
    for (var i=0; i<wrap.children.length; i++) {
      var ch = wrap.children[i];
      if (ch !== np.el && ch.classList.contains('pane')) { sibling = ch; break; }
      if (ch !== np.el && (ch.classList.contains('split-h') || ch.classList.contains('split-v'))) { sibling = ch; break; }
    }
    np.term.dispose();
    delete panes[np.id];
    if (sibling && parent) {
      sibling.style.flex = '';
      parent.replaceChild(sibling, wrap);
    }
  }
  connectingFor = null;
  hideOverlay();
  $('btnCancel').classList.add('h');
  // Activate remaining pane
  var ids = Object.keys(panes);
  if (ids.length) activatePane(ids[ids.length - 1]);
}

function closePane(id) {
  var p = panes[id];
  if (!p) return;
  // Cancel active transfers
  if (p.upload) { p.upload.cancelled = true; closeUploadSession(p.upload); }
  if (p.download) { p.download.cancelled = true; if(p.download.bgSid) api('disconnect',{body:{session_id:p.download.bgSid}}).catch(function(){}); }
  // Disconnect main session
  if (p.sid) {
    p.polling = false;
    stopKeepalive(p);
    clearIdleTimer(p);
    api('disconnect', {body:{session_id:p.sid}}).catch(function(){});
  }
  p.term.dispose();
  saveSessions();

  var wrap = p.el.parentNode;
  delete panes[id];

  // If no panes left, create a fresh one and show auth overlay
  if (!Object.keys(panes).length) {
    var root = $('panes');
    root.innerHTML = '';
    var np = createPane(root);
    activatePane(np.id);
    connectingFor = np.id;
    showOverlay();
    $('btnCancel').classList.add('h');
    renderSaved();
    return;
  }

  // Unwrap: replace split container with the remaining child
  var sibling = null;
  for (var i=0; i<wrap.children.length; i++) {
    var ch = wrap.children[i];
    if (ch !== p.el && !ch.classList.contains('split-handle')) { sibling = ch; break; }
  }
  if (sibling && wrap.parentNode) {
    sibling.style.flex = '';
    wrap.parentNode.replaceChild(sibling, wrap);
  } else {
    p.el.remove();
  }

  // Activate another pane
  if (activeId === id) {
    var ids = Object.keys(panes);
    if (ids.length) activatePane(ids[0]);
  }

  // Refit all terminals after layout change
  Object.keys(panes).forEach(function(k){ panes[k].fitAddon.fit() });
}

// ── Per-pane session helpers ────────────────────────────────────────
function startKeepalive(p) {
  stopKeepalive(p);
  p.keepaliveTimer = setInterval(function(){ if(p.sid) api('ping').catch(function(){}) }, 30000);
}
function stopKeepalive(p) {
  if(p.keepaliveTimer){ clearInterval(p.keepaliveTimer); p.keepaliveTimer=null }
}

// ── Reconnect ────────────────────────────────────────────────────────
function showReconnectBar(p) {
  var bar = p.el.querySelector('[data-reconnect]');
  if (bar) bar.classList.remove('h');
}
function hideReconnectBar(p) {
  var bar = p.el.querySelector('[data-reconnect]');
  if (bar) bar.classList.add('h');
}
function reconnectPane(id) {
  var p = panes[id]; if (!p || !p.connectBody) return;
  hideReconnectBar(p);
  connectPane(p, {body: p.connectBody, label: p.label});
}
function newConnectionPane(id) {
  var p = panes[id]; if (!p) return;
  hideReconnectBar(p);
  p.term.reset();
  connectingFor = p.id;
  showOverlay();
  var hasOthers = Object.keys(panes).length > 1;
  $('btnCancel').className = hasOthers ? 'btn btn-cancel' : 'btn btn-cancel h';
  prefillForm(p);
  renderSaved();
}

// ── Idle timeout warning ────────────────────────────────────────────
function resetIdleTimer(p) {
  clearIdleTimer(p);
  if (!p.sid || sessionTimeout <= 0) return;
  var warnAt = Math.max(0, sessionTimeout - 30) * 1000;
  p.idleTimer = setTimeout(function() { showIdleWarning(p); }, warnAt);
}
function clearIdleTimer(p) {
  if (p.idleTimer) { clearTimeout(p.idleTimer); p.idleTimer = null; }
  dismissIdleWarning(p);
}
function showIdleWarning(p) {
  if (!p.sid) return;
  var el = document.createElement('div');
  el.className = 'idle-warn';
  el.innerHTML = 'Session idle — will disconnect in 30s ' +
    '<button class="btn" onclick="keepAlive(\'' + p.id + '\')">Keep alive</button>';
  p.el.appendChild(el);
  p.idleWarnEl = el;
}
function dismissIdleWarning(p) {
  if (p.idleWarnEl) { p.idleWarnEl.remove(); p.idleWarnEl = null; }
}
function keepAlive(id) {
  var p = panes[id]; if (!p || !p.sid) return;
  // Send empty input to reset server-side activity timer
  api('input', {body: {session_id: p.sid, data: ''}}).catch(function(){});
  resetIdleTimer(p);
}

// ── Session persistence (sessionStorage) ────────────────────────────
function saveSessions() {
  var data = {};
  Object.keys(panes).forEach(function(k) {
    var p = panes[k];
    if (p.sid && p.connectBody) {
      data[k] = {sid: p.sid, label: p.label, connectBody: p.connectBody};
    }
  });
  try { sessionStorage.setItem('websh_sessions', JSON.stringify(data)); } catch(e) {}
}
function loadSessions() {
  try { return JSON.parse(sessionStorage.getItem('websh_sessions') || '{}'); } catch(e) { return {}; }
}
function clearSavedSessions() {
  try { sessionStorage.removeItem('websh_sessions'); } catch(e) {}
}

// ── Pre-fill form from last connection ──────────────────────────────
function prefillForm(p) {
  if (!p || !p.connectBody) return;
  var b = p.connectBody;
  if (b.host) $('iH').value = b.host;
  if (b.port) $('iP').value = b.port;
  if (b.username) $('iU').value = b.username;
}

// ── Export terminal ─────────────────────────────────────────────────
function exportTerminal() {
  var p = panes[activeId]; if (!p) return;
  var buf = p.term.buffer.active;
  var lines = [];
  for (var i = 0; i <= buf.length - 1; i++) {
    var line = buf.getLine(i);
    if (line) lines.push(line.translateToString(true));
  }
  // Trim trailing empty lines
  while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
  var text = lines.join('\n') + '\n';
  var blob = new Blob([text], {type: 'text/plain'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (p.label || 'terminal') + '.txt';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function pollOutput(p) {
  if(!p.sid || !p.polling) return;
  api('output',{query:'&session_id='+p.sid}).then(function(r){
    p.pollRetries=0;
    if(r.data){
      updatePaneBadge(p);
      p.term.write(Uint8Array.from(atob(r.data),function(c){return c.charCodeAt(0)}));
      resetIdleTimer(p);
    }
    if(r.alive===false){
      p.term.write('\r\n\x1b[90m--- connection closed ---\x1b[0m\r\n');
      stopKeepalive(p); clearIdleTimer(p); p.polling=false; p.sid=null;
      saveSessions();
      if(p.connectBody) showReconnectBar(p);
      if(activeId===p.id) updatePaneBadge(p);
      return;
    }
    if(p.polling) pollOutput(p);
  }).catch(function(e){
    p.pollRetries++;
    if(p.pollRetries>=MAX_POLL_RETRIES){
      var msg = (e && e.message && e.message.indexOf('502') !== -1)
        ? '\r\n\x1b[91m--- backend restarted, session lost ---\x1b[0m\r\n'
        : '\r\n\x1b[91m--- connection lost ---\x1b[0m\r\n';
      p.term.write(msg);
      stopKeepalive(p); clearIdleTimer(p); p.polling=false; p.sid=null;
      saveSessions();
      if(p.connectBody) showReconnectBar(p);
      if(activeId===p.id) updatePaneBadge(p);
      return;
    }
    var d=Math.min(1000*Math.pow(2,p.pollRetries-1),10000);
    setTimeout(function(){ if(p.polling) pollOutput(p) },d);
  });
}

function queueInput(p, data) {
  p.inputQueue.push(data);
  resetIdleTimer(p);
  if(!p.flushTimer) p.flushTimer = setTimeout(function(){
    p.flushTimer=null;
    if(!p.sid||!p.inputQueue.length) return;
    var d=p.inputQueue.join(''); p.inputQueue=[];
    api('input',{body:{session_id:p.sid,data:d}}).catch(function(){});
  }, 10);
}

// ── Unified connect ─────────────────────────────────────────────────
function connectPane(p, opts) {
  p.label = opts.label;
  p.connectBody = opts.body; // store for background sessions (upload)
  hideReconnectBar(p);
  var labelEl = p.el.querySelector('[data-pane-label]');
  if (labelEl) labelEl.textContent = opts.label;
  p.term.reset();
  setTitle(opts.label);
  updatePaneBadge(p);

  api('connect', {body: opts.body})
    .then(function(r) {
      if (r.error) { showErr(r.error); updatePaneBadge(p); return }
      if (r.alive === false) { showErr('SSH process exited immediately'); updatePaneBadge(p); return }
      p.sid = r.session_id;
      hideOverlay();
      $('btnCancel').classList.add('h');
      connectingFor = null;
      p.term.focus();
      p.polling = true;
      p.pollRetries = 0;
      startKeepalive(p);
      resetIdleTimer(p);
      saveSessions();
      pollOutput(p);
    })
    .catch(function(e) {
      showErr('Connection failed: ' + e.message);
      updatePaneBadge(p);
    });
}

function targetPane() {
  // Which pane are we connecting for?
  if (connectingFor && panes[connectingFor]) return panes[connectingFor];
  if (activeId && panes[activeId]) return panes[activeId];
  return null;
}

// ── UI ──────────────────────────────────────────────────────────────
function setTitle(label) {
  document.title = label ? label + ' \u2014 websh' : 'websh \u2014 Lightweight web terminal';
}


function showOverlay(){ $('ov').classList.remove('h'); focusFirst() }
function hideOverlay(){ $('ov').classList.add('h') }
function showErr(m){ var e=$('err'); e.textContent=m; e.classList.add('on') }
function hideErr(){ $('err').classList.remove('on') }

function focusFirst() {
  if($('manualForm').classList.contains('h')) return;
  var el=$('iH'); if(!el.value){el.focus();return}
  el=$('iU'); if(!el.value){el.focus();return}
  $('iPw').focus();
}

function toggleSaveName() { $('saveNameWrap').className=$('iSave').checked?'save-name':'save-name h' }

function setAuthTab(mode) {
  authMode=mode;
  $('tabPw').className='auth-tab'+(mode==='pw'?' active':'');
  $('tabKey').className='auth-tab'+(mode==='key'?' active':'');
  $('authPw').className=mode==='pw'?'fg':'fg h';
  $('authKey').className=mode==='key'?'fg':'fg h';
}

// ── Saved connections (localStorage) ────────────────────────────────
function loadSaved() { try{return JSON.parse(localStorage.getItem('websh_connections')||'[]')}catch(e){return[]} }
function saveSaved(list) { localStorage.setItem('websh_connections',JSON.stringify(list)) }

function renderSaved() {
  var list=loadSaved(), el=$('savedList');
  el.innerHTML='';
  $('divider').querySelector('span').textContent=list.length?'Or connect manually':'Connect';
  list.forEach(function(c,i){
    var div=document.createElement('div'); div.className='sv'; div.setAttribute('data-idx',i);
    div.innerHTML=
      '<div class="sv-info"><div class="sv-name">'+esc(c.name)+'</div>'+
      '<div class="sv-host">'+esc(c.user)+'@'+esc(c.host)+':'+c.port+(c.key?' (key)':'')+'</div></div>'+
      '<div class="sv-actions"><button class="sv-btn del" data-idx="'+i+'">Delete</button></div>';
    el.appendChild(div);
  });
  el.onclick=function(e){
    if(e.target.classList.contains('del')){
      list.splice(parseInt(e.target.getAttribute('data-idx')),1);saveSaved(list);renderSaved();return;
    }
    var row=e.target.closest('.sv'); if(!row) return;
    var idx=parseInt(row.getAttribute('data-idx')); if(isNaN(idx)) return;
    connectSaved(list[idx]);
  };
}

function connectSaved(c) {
  hideErr();
  var p = targetPane(); if(!p) return;
  var label = c.name||(c.user+'@'+c.host);
  var body = {host:c.host,port:c.port,username:c.user,password:c.pass||'',cols:p.term.cols,rows:p.term.rows};
  if(c.key) body.key=c.key;
  connectPane(p, {body:body, label:label});
}

function connectByName(name) {
  hideErr();
  var p = targetPane(); if(!p) return;
  var c=null;
  if(serverConfig && serverConfig.connections){
    for(var i=0;i<serverConfig.connections.length;i++){
      if(serverConfig.connections[i].name===name){c=serverConfig.connections[i];break}
    }
  }
  if(!c) return;
  connectPane(p, {
    body:{connection:name,cols:p.term.cols,rows:p.term.rows},
    label:name
  });
}

function doConnect() {
  hideErr();
  var p = targetPane(); if(!p) return;
  var host=$('iH').value.trim(), port=parseInt($('iP').value)||22, username=$('iU').value.trim();
  var password=authMode==='pw'?$('iPw').value:$('iKeyPw').value;
  var key=authMode==='key'?$('iKey').value.trim():'';
  if(!host||!username){showErr('Host and username are required');return}
  if(authMode==='pw'&&!password){showErr('Password is required');return}
  if(authMode==='key'&&!key){showErr('Private key is required');return}
  if($('iSave').checked){
    var name=$('iName').value.trim()||(username+'@'+host), list=loadSaved();
    var entry={name:name,host:host,port:port,user:username,auth:authMode};
    if(authMode==='pw') entry.pass=password; else entry.key=key;
    list=list.filter(function(c){return c.name!==name}); list.unshift(entry);
    saveSaved(list); $('iSave').checked=false; toggleSaveName();
  }
  var body={host:host,port:port,username:username,password:password,cols:p.term.cols,rows:p.term.rows};
  if(key) body.key=key;
  connectPane(p, {body:body, label:username+'@'+host});
}

function doDisconnect() {
  var p=panes[activeId]; if(!p) return;
  p.polling=false; stopKeepalive(p); clearIdleTimer(p);
  if(p.sid){api('disconnect',{body:{session_id:p.sid}}).catch(function(){});p.sid=null}
  saveSessions();
  p.label='';
  var labelEl=p.el.querySelector('[data-pane-label]'); if(labelEl) labelEl.textContent='';
  updatePaneBadge(p);
  p.term.reset();
  connectingFor=p.id;
  showOverlay();
  // Show cancel only if there are other panes with active sessions
  var hasOthers=false;
  Object.keys(panes).forEach(function(k){if(k!==p.id && panes[k].sid) hasOthers=true});
  $('btnCancel').className = hasOthers || Object.keys(panes).length>1 ? 'btn btn-cancel' : 'btn btn-cancel h';
  renderSaved();
}

// ── Server config ───────────────────────────────────────────────────
function loadServerConfig() {
  api('config').then(function(cfg){
    serverConfig=cfg;
    if(cfg.session_timeout) sessionTimeout=cfg.session_timeout;
    renderServerConnections();
    // Try to restore sessions from page reload
    if(!tryRestoreSessions()) {
      // Check for URL anchor auto-connect: #connect=ConnectionName
      var hash = location.hash.replace(/^#/, '');
      var m = hash.match(/^connect=(.+)/);
      if(m && serverConfig && serverConfig.connections) {
        var name = decodeURIComponent(m[1]);
        var found = serverConfig.connections.some(function(c){return c.name===name});
        if(found) { connectByName(name); return; }
      }
      showOverlay();
    }
  }).catch(function(){
    showOverlay();
  });
}

function renderServerConnections() {
  if(!serverConfig||!serverConfig.connections||!serverConfig.connections.length){$('serverSection').className='saved-section h';return}
  $('serverSection').className='saved-section';
  var el=$('serverList'); el.innerHTML='';
  serverConfig.connections.forEach(function(c){
    var div=document.createElement('div'); div.className='sv'; div.setAttribute('data-name',c.name);
    div.innerHTML='<div class="sv-info"><div class="sv-name">'+esc(c.name)+'</div>'+
      '<div class="sv-host">'+esc(c.username)+'@'+esc(c.host)+':'+c.port+'</div></div>';
    el.appendChild(div);
  });
  el.onclick=function(e){var row=e.target.closest('.sv');if(!row)return;connectByName(row.getAttribute('data-name'))};
  if(serverConfig.restrict_hosts){$('manualForm').classList.add('h');$('divider').classList.add('h');$('localSection').classList.add('h')}
}

// ── File upload (background SSH session) ────────────────────────────
var SLICE_SIZE = 32768; // 32KB file slices

function delay(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function bgSend(u, data) {
  if (!u || !u.bgSid) return Promise.reject(new Error('no background session'));
  return api('input', { body: { session_id: u.bgSid, data: data } });
}
function bgDlSend(p, data) {
  if (!p.download || !p.download.bgSid) return Promise.reject(new Error('no background session'));
  return api('input', { body: { session_id: p.download.bgSid, data: data } });
}

function triggerUpload(id) {
  var p = panes[id];
  if (!p || !p.sid || p.upload || !p.connectBody) return;
  p.el.querySelector('[data-upload-input="' + id + '"]').click();
}

function handleUpload(id, input) {
  var p = panes[id];
  if (!p || !p.sid || !input.files.length || !p.connectBody) return;
  var files = Array.prototype.slice.call(input.files);
  input.value = '';
  var totalSize = 0;
  files.forEach(function(f){ totalSize += f.size });
  p.upload = {
    files:files, fileIndex:0, cancelled:false,
    totalSize:totalSize, sentBytes:0, fileOffset:0, fileSize:0,
    bgSid:null, currentFile:null
  };
  showUploadProgress(p);
  updatePaneBadge(p);

  // Create background SSH session with same credentials
  var body = {};
  for (var k in p.connectBody) body[k] = p.connectBody[k];
  body.cols = 80; body.rows = 24;
  api('connect', {body: body}).then(function(r) {
    if (!p.upload || p.upload.cancelled) return;
    if (r.error || r.alive === false) { finishUpload(p, false); return; }
    p.upload.bgSid = r.session_id;
    // Wait for SSH to fully connect
    return delay(2000);
  }).then(function() {
    if (!p.upload || p.upload.cancelled) return;
    // Drain initial output (MOTD etc) so it doesn't interfere
    return api('output', {query: '&session_id=' + p.upload.bgSid});
  }).then(function() {
    if (!p.upload || p.upload.cancelled) return;
    uploadNextFile(p);
  }).catch(function() { finishUpload(p, false); });
}

// Encode filename as base64 to avoid ANY shell injection
function safeShellName(name) { return btoa(unescape(encodeURIComponent(name))); }

function makeRenamCmd(name) {
  // Shell command: mv tmp → final, with auto-increment if final exists.
  // All filenames base64-encoded to prevent injection.
  var b64 = safeShellName(name);
  var b64tmp = safeShellName('.' + name + '.websh.tmp');
  // Decode names into shell vars, then increment if needed, then mv
  return 't="$(echo ' + b64tmp + ' | base64 -d)"; ' +
    'f="$(echo ' + b64 + ' | base64 -d)"; ' +
    'b="${f%.*}"; e="${f##*.}"; ' +
    'if [ "$b.$e" = "$f" ]; then ' +
      'n=1; while [ -e "$f" ]; do f="$b($n).$e"; n=$((n+1)); done; ' +
    'else ' +
      'n=1; while [ -e "$f" ]; do f="${f%(*)}($n)"; n=$((n+1)); done; ' +
    'fi; ' +
    'mv "$t" "$f"\n';
}

function uploadNextFile(p) {
  var u = p.upload;
  if (!u || u.cancelled) return;
  if (u.fileIndex >= u.files.length) { finishUpload(p, true); return; }
  var file = u.files[u.fileIndex];
  u.fileOffset = 0;
  u.fileSize = file.size;
  u.currentFile = file.name;
  u.currentTmp = '.' + file.name + '.websh.tmp';

  var b64tmp = safeShellName(u.currentTmp);
  // Start base64 decode into temp file (filename base64-encoded — injection-safe)
  bgSend(u, "base64 -d > \"$(echo " + b64tmp + " | base64 -d)\"\n").then(function() {
    if (!u || u.cancelled) return;
    return delay(50);
  }).then(function() {
    sendNextSlice(p, file);
  }).catch(function() { finishUpload(p, false); });
}

function sendNextSlice(p, file) {
  var u = p.upload;
  if (!u || u.cancelled || !u.bgSid) return;

  if (u.fileOffset >= file.size) {
    // Send Ctrl+D to end base64, rename tmp → final, move to next file
    bgSend(u, '\x04').then(function() {
      return delay(50);
    }).then(function() {
      // Rename tmp → final (auto-increments if file already exists)
      return bgSend(u, makeRenamCmd(u.currentFile));
    }).then(function() {
      u.sentBytes += file.size;
      u.fileIndex++;
      u.currentFile = null;
      u.currentTmp = null;
      updateUploadProgress(p);
      return delay(100);
    }).then(function() {
      uploadNextFile(p);
    }).catch(function() { finishUpload(p, false); });
    return;
  }

  var end = Math.min(u.fileOffset + SLICE_SIZE, file.size);
  var slice = file.slice(u.fileOffset, end);
  var reader = new FileReader();
  reader.onload = function(e) {
    if (!u || u.cancelled) return;
    var bytes = new Uint8Array(e.target.result);
    var binary = '';
    for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    var b64 = btoa(binary);
    var lines = '';
    for (var j = 0; j < b64.length; j += 76) lines += b64.substring(j, j + 76) + '\n';
    bgSend(u, lines).then(function() {
      if (!u || u.cancelled) return;
      u.fileOffset = end;
      updateUploadProgress(p);
      sendNextSlice(p, file);
    }).catch(function() { finishUpload(p, false); });
  };
  reader.onerror = function() { finishUpload(p, false); };
  reader.readAsArrayBuffer(slice);
}

function showUploadProgress(p) {
  var label = p.el.querySelector('[data-pane-label]');
  var prog = p.el.querySelector('[data-upload-progress]');
  if (label) label.classList.add('h');
  if (prog) {
    // Reset state from previous operation
    prog.querySelector('.upload-progress-bar').style.width = '0%';
    prog.querySelector('.upload-progress-bar').style.background = '';
    prog.querySelector('.upload-progress-text').textContent = '';
    prog.classList.remove('h');
  }
}

function hideUploadProgress(p) {
  var label = p.el.querySelector('[data-pane-label]');
  var prog = p.el.querySelector('[data-upload-progress]');
  if (label) label.classList.remove('h');
  if (prog) prog.classList.add('h');
}

function updateUploadProgress(p) {
  if (!p.upload) return;
  var el = p.el.querySelector('[data-upload-progress]');
  if (!el) return;
  var u = p.upload;
  var total = u.files.length, done = u.fileIndex;
  var file = done < total ? u.files[done] : null;
  var name = file ? file.name : 'Done';
  var bytesDone = u.sentBytes + (u.fileSize > 0 ? u.fileOffset : 0);
  var pct = u.totalSize > 0 ? Math.min(100, Math.round(bytesDone / u.totalSize * 100)) : 0;
  el.querySelector('.upload-progress-bar').style.width = pct + '%';
  var prefix = total > 1 ? '(' + Math.min(done + 1, total) + '/' + total + ') ' : '';
  el.querySelector('.upload-progress-text').textContent = prefix + name + ' ' + pct + '%';
}

function closeUploadSession(u) {
  if (u && u.bgSid) {
    api('disconnect', {body: {session_id: u.bgSid}}).catch(function(){});
    u.bgSid = null;
  }
}

function finishUpload(p, success) {
  if (!p.upload) return;
  var u = p.upload;
  u.cancelled = true;
  closeUploadSession(u);
  var el = p.el.querySelector('[data-upload-progress]');
  if (el) {
    var bar = el.querySelector('.upload-progress-bar');
    var text = el.querySelector('.upload-progress-text');
    if (success) {
      bar.style.width = '100%'; bar.style.background = 'var(--ok)';
      text.textContent = 'Upload complete';
    } else {
      bar.style.background = 'var(--dg)';
      text.textContent = 'Upload failed';
    }
  }
  setTimeout(function() {
    p.upload = null;
    hideUploadProgress(p);
    updatePaneBadge(p);
    if (el) el.querySelector('.upload-progress-bar').style.background = '';
  }, 2000);
}

function cancelUpload(id) {
  var p = panes[id];
  if (!p || !p.upload) return;
  var u = p.upload;
  var fileName = u.currentFile;
  u.cancelled = true;

  // Abort base64, delete temp file, close background session
  var tmpName = u.currentTmp;
  if (u.bgSid) {
    bgSend(u, '\x03\n').then(function() {
      if (tmpName) { var b=safeShellName(tmpName); return bgSend(u, "rm -f \"$(echo " + b + " | base64 -d)\"\n"); }
    }).then(function() {
      return delay(100);
    }).then(function() {
      closeUploadSession(u);
    }).catch(function() {
      closeUploadSession(u);
    });
  }

  var el = p.el.querySelector('[data-upload-progress]');
  if (el) {
    el.querySelector('.upload-progress-bar').style.background = 'var(--wn)';
    el.querySelector('.upload-progress-text').textContent = 'Cancelled';
  }
  setTimeout(function() {
    p.upload = null;
    hideUploadProgress(p);
    updatePaneBadge(p);
    if (el) el.querySelector('.upload-progress-bar').style.background = '';
  }, 2000);
}

function cancelTransfer(id) {
  var p = panes[id];
  if (p && p.upload) cancelUpload(id);
  else if (p && p.download) cancelDownload(id);
}

// ── File download (background SSH session) ─────────────────────────
function triggerDownload(id) {
  var p = panes[id];
  if (!p || !p.sid || p.upload || p.download || !p.connectBody) return;
  // Use terminal selection as filename, or prompt
  var sel = (p.term.getSelection() || '').trim().replace(/^['"]|['"]$/g, '');
  if (sel && sel.indexOf('\n') === -1 && sel.length < 256) {
    startDownload(p, sel);
  } else {
    var name = prompt('Filename to download:');
    if (name && name.trim()) startDownload(p, name.trim());
  }
}

function startDownload(p, filename) {
  var b64name = safeShellName(filename);
  var sf = '"$(echo ' + b64name + ' | base64 -d)"'; // injection-safe shell ref
  p.download = { cancelled: false, bgSid: null, filename: filename, b64: '', expectedSize: 0 };
  showUploadProgress(p);
  updatePaneBadge(p);

  // Create background session
  var body = {};
  for (var k in p.connectBody) body[k] = p.connectBody[k];
  body.cols = 80; body.rows = 24;
  api('connect', {body: body}).then(function(r) {
    if (!p.download || p.download.cancelled) return;
    if (r.error || r.alive === false) { finishDownload(p, false); return; }
    p.download.bgSid = r.session_id;
    // Wait for SSH + MOTD, then send base64 command with error marker
    // No separate stat step — just try base64 and detect failure via marker
    return delay(3000);
  }).then(function() {
    if (!p.download || p.download.cancelled) return;
    // Drain all MOTD output before sending command
    function drain() {
      return api('output', {query: '&session_id=' + p.download.bgSid}).then(function(r) {
        if (r && r.data && atob(r.data).length > 0) return delay(200).then(drain);
      });
    }
    return drain();
  }).then(function() {
    if (!p.download || p.download.cancelled) return;
    // Disable echo so our command doesn't appear in output
    return bgDlSend(p, 'stty -echo\n');
  }).then(function() {
    return delay(200);
  }).then(function() {
    if (!p.download || p.download.cancelled) return;
    return bgDlSend(p, 'base64 ' + sf + ' 2>/dev/null && echo WEBSH_DL_DONE || echo WEBSH_DL_ERR\n');
  }).then(function() {
    if (!p.download || p.download.cancelled) return;
    pollDownload(p);
  }).catch(function() { finishDownload(p, false); });
}

var MAX_DOWNLOAD_B64 = 50 * 1024 * 1024; // ~37MB file limit

function pollDownload(p) {
  var dl = p.download;
  if (!dl || dl.cancelled || !dl.bgSid) return;
  api('output', {query: '&session_id=' + dl.bgSid}).then(function(r) {
    if (!dl || dl.cancelled) return;
    if (r.data) {
      var chunk = atob(r.data);
      dl.b64 += chunk;
      if (dl.b64.length > MAX_DOWNLOAD_B64) { finishDownload(p, false, 'File too large'); return; }

      // Check for error (file not found)
      if (dl.b64.indexOf('WEBSH_DL_ERR') !== -1) { finishDownload(p, false, 'File not found'); return; }

      // Check if done — extract only the base64 content (skip MOTD/prompts)
      var doneIdx = dl.b64.indexOf('WEBSH_DL_DONE');
      if (doneIdx !== -1) {
        // base64 output is pure [A-Za-z0-9+/=\n] — extract it
        var raw = dl.b64.substring(0, doneIdx);
        // Find start of actual base64 (after MOTD/prompt) — look for first long base64 line
        var lines = raw.split('\n');
        var b64lines = [];
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (line && /^[A-Za-z0-9+/=]+$/.test(line)) b64lines.push(line);
        }
        dl.b64 = b64lines.join('');
        saveDownload(p);
        return;
      }
      updateDownloadProgress(p);
    }
    if (r.alive === false) { finishDownload(p, false); return; }
    pollDownload(p);
  }).catch(function() {
    finishDownload(p, false);
  });
}

function updateDownloadProgress(p) {
  var dl = p.download;
  if (!dl) return;
  var el = p.el.querySelector('[data-upload-progress]');
  if (!el) return;
  var bar = el.querySelector('.upload-progress-bar');
  // Indeterminate: pulse between 20-80% based on data received
  var kb = Math.round(dl.b64.length / 1024);
  var pulse = 20 + (Math.sin(Date.now() / 500) + 1) * 30;
  bar.style.width = pulse + '%';
  bar.style.opacity = '0.7';
  el.querySelector('.upload-progress-text').textContent = dl.filename + ' (' + kb + ' KB)';
}

function saveDownload(p) {
  var dl = p.download;
  if (!dl) return;
  try {
    // Decode base64 — remove any whitespace/newlines
    var clean = dl.b64.replace(/\s/g, '');
    var binary = atob(clean);
    var bytes = new Uint8Array(binary.length);
    for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    var blob = new Blob([bytes], {type: 'application/octet-stream'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = dl.filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    finishDownload(p, true);
  } catch(e) {
    finishDownload(p, false, 'Decode error');
  }
}

function finishDownload(p, success, msg) {
  var dl = p.download;
  if (!dl) return;
  dl.cancelled = true;
  if (dl.bgSid) {
    api('disconnect', {body: {session_id: dl.bgSid}}).catch(function(){});
    dl.bgSid = null;
  }
  var el = p.el.querySelector('[data-upload-progress]');
  if (el) {
    var bar = el.querySelector('.upload-progress-bar');
    var text = el.querySelector('.upload-progress-text');
    if (success) {
      bar.style.width = '100%'; bar.style.background = 'var(--ok)';
      text.textContent = 'Download complete';
    } else {
      bar.style.background = 'var(--dg)';
      text.textContent = msg || 'Download failed';
    }
  }
  setTimeout(function() {
    p.download = null;
    hideUploadProgress(p);
    updatePaneBadge(p);
    if (el) el.querySelector('.upload-progress-bar').style.background = '';
  }, 2000);
}

function cancelDownload(id) {
  var p = panes[id];
  if (!p || !p.download) return;
  p.download.cancelled = true;
  if (p.download.bgSid) {
    api('disconnect', {body: {session_id: p.download.bgSid}}).catch(function(){});
    p.download.bgSid = null;
  }
  var el = p.el.querySelector('[data-upload-progress]');
  if (el) {
    el.querySelector('.upload-progress-bar').style.background = 'var(--wn)';
    el.querySelector('.upload-progress-text').textContent = 'Cancelled';
  }
  setTimeout(function() {
    p.download = null;
    hideUploadProgress(p);
    updatePaneBadge(p);
    if (el) el.querySelector('.upload-progress-bar').style.background = '';
  }, 2000);
}

// ── Search ──────────────────────────────────────────────────────────
function activeSearch() { var p=panes[activeId]; return p?p.searchAddon:null }
function toggleSearch() {
  var p=panes[activeId]; if(!p) return;
  var bar=p.el.querySelector('[data-search]');
  if(bar.classList.contains('h')){bar.classList.remove('h');bar.querySelector('input').focus()}
  else closeSearch();
}
function closeSearch(){
  var p=panes[activeId]; if(!p) return;
  p.el.querySelector('[data-search]').classList.add('h');
  p.searchAddon.clearDecorations(); p.term.focus();
}
function searchNext(){ var s=activeSearch(); if(s){var p=panes[activeId];s.findNext(p.el.querySelector('[data-search] input').value)} }
function searchPrev(){ var s=activeSearch(); if(s){var p=panes[activeId];s.findPrevious(p.el.querySelector('[data-search] input').value)} }

// Search input events — delegated
document.addEventListener('keydown', function(e) {
  if(e.target.closest('[data-search]')){
    if(e.key==='Enter'){e.shiftKey?searchPrev():searchNext()}
    if(e.key==='Escape') closeSearch();
  }
});

// ── Zoom ────────────────────────────────────────────────────────────
function zoomIn(){fontSize=Math.min(fontSize+2,32);applyZoom()}
function zoomOut(){fontSize=Math.max(fontSize-2,8);applyZoom()}
function applyZoom(){
  Object.keys(panes).forEach(function(k){panes[k].term.options.fontSize=fontSize;panes[k].fitAddon.fit()});
}

// ── Fullscreen ──────────────────────────────────────────────────────
function toggleFullscreen(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(function(){});
  else document.exitFullscreen();
}

// ── Theme ───────────────────────────────────────────────────────────
function toggleTheme(){
  var isLight=document.documentElement.getAttribute('data-theme')==='light';
  document.documentElement.setAttribute('data-theme',isLight?'dark':'light');
  var t=isLight?darkTheme:lightTheme;
  Object.keys(panes).forEach(function(k){panes[k].term.options.theme=t});
  localStorage.setItem('websh_theme',isLight?'dark':'light');
}

// ── Split handle drag resize (mouse + touch) ───────────────────────
(function(){
  var dragging=null;
  function startDrag(handle, clientX, clientY) {
    var wrap=handle.parentNode;
    var isH=wrap.classList.contains('split-h');
    var children=[];
    for(var i=0;i<wrap.children.length;i++){
      var ch=wrap.children[i];
      if(!ch.classList.contains('split-handle')) children.push(ch);
    }
    if(children.length<2) return;
    dragging={handle:handle,wrap:wrap,isH:isH,a:children[0],b:children[1]};
    handle.classList.add('dragging');
    document.body.classList.add(isH?'resizing':'resizing-v');
  }
  function moveDrag(clientX, clientY) {
    if(!dragging) return;
    var rect=dragging.wrap.getBoundingClientRect();
    var ratio = dragging.isH
      ? (clientX-rect.left)/rect.width
      : (clientY-rect.top)/rect.height;
    ratio=Math.max(0.1,Math.min(0.9,ratio));
    dragging.a.style.flex=ratio+'';
    dragging.b.style.flex=(1-ratio)+'';
    Object.keys(panes).forEach(function(k){panes[k].fitAddon.fit()});
  }
  function endDrag() {
    if(!dragging) return;
    dragging.handle.classList.remove('dragging');
    document.body.classList.remove('resizing','resizing-v');
    dragging=null;
    Object.keys(panes).forEach(function(k){panes[k].fitAddon.fit()});
  }
  // Mouse events
  document.addEventListener('mousedown',function(e){
    if(!e.target.classList.contains('split-handle')) return;
    e.preventDefault(); startDrag(e.target, e.clientX, e.clientY);
  });
  document.addEventListener('mousemove',function(e){ moveDrag(e.clientX, e.clientY) });
  document.addEventListener('mouseup', endDrag);
  // Touch events
  document.addEventListener('touchstart',function(e){
    if(!e.target.classList.contains('split-handle')) return;
    e.preventDefault(); var t=e.touches[0]; startDrag(e.target, t.clientX, t.clientY);
  }, {passive:false});
  document.addEventListener('touchmove',function(e){
    if(!dragging) return; e.preventDefault(); var t=e.touches[0]; moveDrag(t.clientX, t.clientY);
  }, {passive:false});
  document.addEventListener('touchend', endDrag);
  document.addEventListener('touchcancel', endDrag);
})();

// ── Keyboard shortcuts ──────────────────────────────────────────────
function cyclePanes(reverse) {
  var ids = Object.keys(panes);
  if (ids.length < 2) return;
  var idx = ids.indexOf(activeId);
  if (reverse) idx = (idx - 1 + ids.length) % ids.length;
  else idx = (idx + 1) % ids.length;
  activatePane(ids[idx]);
}
document.addEventListener('keydown', function(e) {
  if(e.ctrlKey&&e.shiftKey&&e.key==='F'){e.preventDefault();toggleSearch()}
  if(e.ctrlKey&&!e.shiftKey&&(e.key==='='||e.key==='+')){e.preventDefault();zoomIn()}
  if(e.ctrlKey&&!e.shiftKey&&e.key==='-'){e.preventDefault();zoomOut()}
  if(e.key==='F11'){e.preventDefault();toggleFullscreen()}
  // Ctrl+Tab / Ctrl+Shift+Tab to switch panes
  if(e.ctrlKey&&e.key==='Tab'){e.preventDefault();cyclePanes(e.shiftKey)}
});

// ── Enter to connect ────────────────────────────────────────────────
document.querySelector('.panel').addEventListener('keydown', function(e) {
  if(e.key==='Enter'&&e.target.matches('input:not([type=checkbox])')) doConnect();
});

// ── Session restore ─────────────────────────────────────────────────
function tryRestoreSessions() {
  var saved = loadSessions();
  var keys = Object.keys(saved);
  if (!keys.length) return false;
  var first = saved[keys[0]];
  var p = panes[Object.keys(panes)[0]];
  if (!p || !first.sid) return false;
  p.label = first.label || '';
  p.connectBody = first.connectBody || null;
  p.sid = first.sid;
  var labelEl = p.el.querySelector('[data-pane-label]');
  if (labelEl) labelEl.textContent = p.label;
  setTitle(p.label);
  p.polling = true;
  p.pollRetries = 0;
  startKeepalive(p);
  resetIdleTimer(p);
  updatePaneBadge(p);
  pollOutput(p);
  return true;
}

// ── Init ────────────────────────────────────────────────────────────
(function(){
  var saved=localStorage.getItem('websh_theme');
  if(saved==='light') document.documentElement.setAttribute('data-theme','light');
})();

var rootPane = createPane($('panes'));
activatePane(rootPane.id);
connectingFor = rootPane.id;
$('btnCancel').classList.add('h'); // no cancel on first connect

loadServerConfig();
renderSaved();
focusFirst();
</script>
